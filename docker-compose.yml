version: '3.8'

services:
  cvd-app:
    build: .
    container_name: cvd-risk-predictor
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - TZ=UTC
    volumes:
      - ./app.py:/app/app.py
      - ./my_cnn_lstm_model.keras:/app/my_cnn_lstm_model.keras
      - ./my_scaler.joblib:/app/my_scaler.joblib
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
